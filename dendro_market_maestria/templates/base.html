<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}DENDRO MARKET{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <nav class="topbar">
    <a class="brand" href="/">
      <span class="brand-mark">D</span>
      <span><b>DENDRO</b> MARKET</span>
    </a>
    <div class="nav-links">
      <a href="/market">Catálogo</a>
      <a href="/bounty">Bug bounty</a>
      {% if user %}
        <a href="/dashboard">Dashboard</a>
        <a href="/admin">Admin</a>
        <a class="btn-small" href="/logout">Salir</a>
      {% else %}
        <a class="btn-small" href="/login">Ingresar</a>
      {% endif %}
    </div>
  </nav>
  <main>{% block content %}{% endblock %}</main>
  <footer>
    <span>DENDRO MARKET Lab</span>
    <span>OWASP A01 · Control de Acceso Avanzado</span>
    <span>Uso local autorizado</span>
  </footer>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
